<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline RSS | Reader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .prose img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1.5rem 0; }
        .prose a { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .prose p { margin-bottom: 1.25rem; line-height: 1.6; }
        .feed-card { transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .feed-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen dark:bg-zinc-950 dark:text-zinc-100">

    <div class="max-w-4xl mx-auto px-4 py-8">
        <header class="mb-10">
            <div class="flex items-center justify-between mb-8">
                <h1 class="text-2xl font-black tracking-tighter flex items-center gap-2">
                    <span class="bg-blue-600 text-white p-1 rounded">RSS</span>
                    STREAMLINE
                </h1>
                <div id="status" class="text-[10px] font-mono uppercase tracking-widest text-slate-400">Ready</div>
            </div>
            
            <div class="bg-white dark:bg-zinc-900 shadow-xl rounded-2xl border border-slate-200 dark:border-zinc-800 p-3">
                <div class="flex flex-col sm:flex-row gap-2">
                    <input 
                        type="text" 
                        id="rssUrl" 
                        placeholder="Enter Feed XML URL..." 
                        class="flex-1 px-4 py-3 bg-transparent outline-none text-sm font-medium"
                        value="https://minxify.github.io/rss/feed.xml"
                    >
                    <button 
                        onclick="fetchFeed()" 
                        id="fetchBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-bold transition-all active:scale-95 text-sm shadow-lg shadow-blue-500/20"
                    >
                        Fetch Articles
                    </button>
                </div>
            </div>
            
            <div class="mt-4 flex flex-wrap justify-center gap-6">
                <label class="flex items-center text-xs font-semibold text-slate-500 cursor-pointer hover:text-blue-600 transition-colors">
                    <input type="checkbox" id="useProxy" checked class="mr-2 accent-blue-600"> Use CORS Proxy
                </label>
                <div class="text-xs font-semibold text-slate-400">
                    Host: <span class="text-blue-600">GitHub Pages</span>
                </div>
            </div>
        </header>

        <main id="feedContent" class="space-y-6">
            <div class="text-center py-20 text-slate-400">
                <p>Loading your feed...</p>
            </div>
        </main>
    </div>

    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 transform translate-y-20 opacity-0 transition-all duration-500 bg-zinc-900 text-white px-6 py-3 rounded-2xl shadow-2xl text-sm font-medium flex items-center gap-3 border border-zinc-700 z-50">
        <span id="toastMsg"></span>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const feedContent = document.getElementById('feedContent');
        const fetchBtn = document.getElementById('fetchBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');

        function showToast(msg, isError = false) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.toggle('border-red-500', isError);
            toast.classList.toggle('text-red-400', isError);
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 4000);
        }

        async function tryFetch(url, proxyIndex = 0) {
            // Ensure URL ends in .xml if it's a GitHub pages URL missing the file
            if (url.includes("github.io") && !url.toLowerCase().endsWith(".xml") && !url.toLowerCase().endsWith(".rss")) {
                url = url.endsWith("/") ? url + "feed.xml" : url + "/feed.xml";
                document.getElementById('rssUrl').value = url;
            }

            const proxies = [
                (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
                (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                (u) => `https://thingproxy.freeboard.io/fetch/${u}`,
                (u) => u // Direct
            ];

            const useProxy = document.getElementById('useProxy').checked;
            let targetUrl = useProxy ? proxies[proxyIndex](url) : url;
            
            const response = await fetch(targetUrl);
            
            if (response.status === 403) {
                throw new Error("403 Forbidden: GitHub is blocking this request. Try toggling the proxy or check if 'feed.xml' exists in your repo.");
            }
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json().catch(() => null);
            let content = data && data.contents ? data.contents : await response.text();

            if (content.includes("aes.js") || content.includes("slowAES")) {
                throw new Error("Target site is blocking with an AES Challenge.");
            }

            return content;
        }

        async function fetchFeed() {
            const url = document.getElementById('rssUrl').value.trim();
            if (!url) return showToast("Enter a URL first", true);

            fetchBtn.disabled = true;
            fetchBtn.innerHTML = `Fetching...`;
            statusEl.textContent = "Loading...";
            
            try {
                let rawXml = null;
                let lastError = null;

                // Try up to 3 different proxies before giving up
                for(let i = 0; i < 3; i++) {
                    try {
                        rawXml = await tryFetch(url, i);
                        if (rawXml) break;
                    } catch (e) {
                        lastError = e;
                        console.warn(`Proxy ${i} failed, trying next...`);
                    }
                }

                if (!rawXml) throw lastError || new Error("All fetch methods failed.");

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(rawXml, "text/xml");

                if (xmlDoc.getElementsByTagName("parsererror").length > 0) {
                    throw new Error("Unable to parse XML. Make sure the file on GitHub is a valid RSS/XML file.");
                }

                renderFeed(xmlDoc);
                statusEl.textContent = "Live";
            } catch (error) {
                console.error(error);
                statusEl.textContent = "Error";
                showToast(error.message, true);
                feedContent.innerHTML = `<div class="text-center py-20 text-red-500 bg-red-50 dark:bg-red-900/10 rounded-2xl border border-red-200 dark:border-red-900/30 p-8">
                    <p class="font-bold">Fetch Failed (403/Forbidden)</p>
                    <p class="text-sm mt-2">${error.message}</p>
                    <p class="text-xs mt-4 text-slate-500 italic">Tip: Ensure your file is named exactly 'feed.xml' and is in the 'rss' folder on GitHub.</p>
                </div>`;
            } finally {
                fetchBtn.disabled = false;
                fetchBtn.textContent = "Fetch Articles";
            }
        }

        function renderFeed(xml) {
            const items = xml.querySelectorAll("item, entry");
            const channelTitle = xml.querySelector("channel > title, feed > title")?.textContent || "RSS Feed";
            
            let html = `<div class="flex items-center gap-4 mb-8">
                <div class="h-[2px] flex-1 bg-slate-200 dark:bg-zinc-800"></div>
                <h2 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400">${channelTitle}</h2>
                <div class="h-[2px] flex-1 bg-slate-200 dark:bg-zinc-800"></div>
            </div>`;

            if (items.length === 0) {
                html += `<div class="text-center py-20 text-slate-400">The XML file was found, but it contains no articles.</div>`;
            }

            items.forEach(item => {
                const title = item.querySelector("title")?.textContent || "Untitled";
                const link = item.querySelector("link")?.getAttribute("href") || item.querySelector("link")?.textContent || "#";
                const pubDate = item.querySelector("pubDate, published, updated")?.textContent || "";
                let description = item.querySelector("description, summary, content")?.textContent || "";
                description = description.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "").trim();

                const dateObj = new Date(pubDate);
                const displayDate = isNaN(dateObj) ? pubDate : dateObj.toLocaleDateString();

                html += `
                    <article class="feed-card bg-white dark:bg-zinc-900 p-8 rounded-2xl border border-slate-200 dark:border-zinc-800 shadow-sm mb-6">
                        <header class="mb-4">
                            <time class="text-[10px] text-blue-600 font-bold uppercase tracking-widest block mb-1">${displayDate}</time>
                            <a href="${link}" target="_blank" class="text-xl font-bold hover:text-blue-600 transition-colors">${title}</a>
                        </header>
                        <div class="prose dark:prose-invert text-slate-600 dark:text-zinc-400 text-sm line-clamp-4">
                            ${description || 'No description provided.'}
                        </div>
                        <footer class="mt-6">
                             <a href="${link}" target="_blank" class="text-xs font-black text-blue-600 uppercase tracking-widest">Read More →</a>
                        </footer>
                    </article>
                `;
            });
            feedContent.innerHTML = html;
        }

        window.onload = fetchFeed;
    </script>
</body>
</html>
