<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline RSS | Widget</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }

        .prose img { max-width: 100%; height: auto; border-radius: 0.5rem; margin: 1rem 0; }
        .prose a { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .feed-card { transition: transform 0.2s ease; }
        
        #feedContent { min-height: 200px; }
    </style>
</head>
<body class="bg-white text-slate-900 dark:bg-zinc-950 dark:text-zinc-100">

    <div class="w-full max-w-full px-2 py-4">
        <header class="mb-6 px-2">
            <div class="flex items-center justify-between mb-4">
                <h1 class="text-lg font-black tracking-tighter flex items-center gap-1">
                    <span class="bg-blue-600 text-white px-1 rounded text-sm">RSS</span>
                    WIDGET
                </h1>
                <div id="status" class="text-[9px] font-mono uppercase tracking-widest text-slate-400">Ready</div>
            </div>
            
            <div class="bg-slate-50 dark:bg-zinc-900 rounded-xl border border-slate-200 dark:border-zinc-800 p-2 shadow-sm">
                <div class="flex gap-1">
                    <input 
                        type="text" 
                        id="rssUrl" 
                        placeholder="Feed URL..." 
                        class="flex-1 px-3 py-1.5 bg-transparent outline-none text-xs font-medium w-full"
                        value="https://minxify.github.io/rss/feed.xml"
                    >
                    <button 
                        onclick="fetchFeed()" 
                        id="fetchBtn"
                        class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-lg font-bold transition-all active:scale-95 text-[10px] uppercase tracking-wider whitespace-nowrap"
                    >
                        Sync
                    </button>
                </div>
            </div>
            
            <div class="mt-3 flex items-center justify-between px-1">
                <label class="flex items-center text-[10px] font-semibold text-slate-400 cursor-pointer hover:text-blue-600">
                    <input type="checkbox" id="useProxy" checked class="mr-1.5 accent-blue-600"> Use Proxy
                </label>
                <button onclick="toggleCompact()" class="text-[10px] font-bold text-slate-400 uppercase hover:text-blue-600">
                    Toggle Style
                </button>
            </div>
        </header>

        <main id="feedContent" class="space-y-3">
            <div class="flex flex-col items-center justify-center py-10 text-slate-300">
                <svg class="w-8 h-8 animate-pulse mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                <p class="text-[10px] uppercase tracking-widest">Awaiting Sync...</p>
            </div>
        </main>
        
        <footer class="mt-8 py-4 border-t border-slate-100 dark:border-zinc-900 text-center">
            <p class="text-[9px] text-slate-400 font-medium uppercase tracking-widest">Streamline RSS Widget</p>
        </footer>
    </div>

    <div id="toast" class="fixed bottom-4 left-4 right-4 translate-y-20 opacity-0 transition-all duration-500 bg-zinc-900 text-white px-4 py-2 rounded-lg shadow-xl text-[10px] font-bold flex items-center justify-center border border-zinc-700 z-50">
        <span id="toastMsg"></span>
    </div>

    <script>
        const statusEl = document.getElementById('status');
        const feedContent = document.getElementById('feedContent');
        const fetchBtn = document.getElementById('fetchBtn');
        const toast = document.getElementById('toast');
        const toastMsg = document.getElementById('toastMsg');
        let isCompact = false;

        function toggleCompact() {
            isCompact = !isCompact;
            if (window.lastXml) renderFeed(window.lastXml);
            showToast(isCompact ? "List View" : "Card View");
        }

        function showToast(msg, isError = false) {
            toastMsg.textContent = msg;
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.toggle('border-red-500', isError);
            setTimeout(() => toast.classList.add('translate-y-20', 'opacity-0'), 3000);
        }

        async function tryFetch(url, proxyIndex = 0) {
            const proxies = [
                (u) => `https://api.allorigins.win/get?url=${encodeURIComponent(u)}`,
                (u) => `https://corsproxy.io/?${encodeURIComponent(u)}`,
                (u) => `https://thingproxy.freeboard.io/fetch/${u}`,
                (u) => u
            ];

            const useProxy = document.getElementById('useProxy').checked;
            let targetUrl = useProxy ? proxies[proxyIndex](url) : url;
            
            const response = await fetch(targetUrl);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            
            const data = await response.json().catch(() => null);
            let content = data && data.contents ? data.contents : await response.text();

            if (content.includes("aes.js") || content.includes("slowAES")) {
                throw new Error("Target blocked (AES Challenge)");
            }
            return content;
        }

        async function fetchFeed() {
            const url = document.getElementById('rssUrl').value.trim();
            if (!url) return;

            fetchBtn.disabled = true;
            statusEl.textContent = "Syncing...";
            
            try {
                let rawXml = null;
                let finalUrl = url;
                if (url.includes("github.io") && !url.toLowerCase().endsWith(".xml")) {
                    finalUrl = url.endsWith("/") ? url + "feed.xml" : url + "/feed.xml";
                }

                for(let i = 0; i < 4; i++) {
                    try {
                        rawXml = await tryFetch(finalUrl, i);
                        if (rawXml) break;
                    } catch (e) { console.warn(`Proxy ${i} failed`); }
                }

                if (!rawXml) throw new Error("Connection failed");

                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(rawXml, "text/xml");
                window.lastXml = xmlDoc;

                renderFeed(xmlDoc);
                statusEl.textContent = "Live";
            } catch (error) {
                statusEl.textContent = "Error";
                showToast(error.message, true);
                feedContent.innerHTML = `<div class="text-center py-10 text-red-500 text-[10px] font-bold">UNABLE TO REACH FEED</div>`;
            } finally {
                fetchBtn.disabled = false;
            }
        }

        function renderFeed(xml) {
            const itemsNodeList = xml.querySelectorAll("item, entry");
            let itemsArray = Array.from(itemsNodeList).map(item => {
                const title = item.querySelector("title")?.textContent || "Untitled";
                const link = item.querySelector("link")?.getAttribute("href") || item.querySelector("link")?.textContent || "#";
                const dateStr = item.querySelector("pubDate, published, updated")?.textContent || "";
                let description = item.querySelector("description, summary, content")?.textContent || "";
                
                // Sanitize scripts
                description = description.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, "").trim();
                
                const dateObj = new Date(dateStr);
                
                return {
                    title,
                    link,
                    date: dateObj,
                    dateLabel: isNaN(dateObj) ? dateStr : dateObj.toLocaleDateString(),
                    description
                };
            });

            // Sort by date (Newest First)
            itemsArray.sort((a, b) => b.date - a.date);

            let html = ``;

            if (itemsArray.length === 0) {
                html += `<div class="text-center py-10 text-slate-400 text-xs">No items found.</div>`;
            }

            itemsArray.forEach(item => {
                if (isCompact) {
                    html += `
                        <a href="${item.link}" target="_blank" class="block p-3 hover:bg-slate-50 dark:hover:bg-zinc-900 border-l-2 border-transparent hover:border-blue-600 transition-all">
                            <time class="text-[9px] text-slate-400 font-bold uppercase block">${item.dateLabel}</time>
                            <h3 class="text-xs font-bold leading-tight mt-0.5">${item.title}</h3>
                        </a>
                    `;
                } else {
                    html += `
                        <article class="bg-white dark:bg-zinc-900 p-4 rounded-xl border border-slate-200 dark:border-zinc-800 shadow-sm mb-3">
                            <time class="text-[9px] text-blue-600 font-black uppercase mb-1 block">${item.dateLabel}</time>
                            <a href="${item.link}" target="_blank" class="text-base font-bold leading-tight hover:text-blue-600 transition-colors block mb-2">${item.title}</a>
                            <div class="prose dark:prose-invert text-[12px] leading-relaxed text-slate-600 dark:text-zinc-400">
                                ${item.description || 'No description provided.'}
                            </div>
                        </article>
                    `;
                }
            });
            feedContent.innerHTML = html;
        }

        window.onload = fetchFeed;
    </script>
</body>
</html>
